<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Grenada_2026</title>

<style>

body{
  margin:0;
  background:lightcyan;
  font-family:Arial,sans-serif;
}

.container{
  max-width:1600px;
  margin:auto;
  padding:20px;
}

h1{
  text-align:center;
  margin-bottom:30px;
  color:#111;
}

.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:15px;
}

.item{
  overflow:hidden;
  border-radius:12px;
  cursor:pointer;
  background:#f5f5f5;
}

/* =========================
SHOW FULL IMAGE/VIDEO
========================= */

.item img,
.item video{
  width:100%;
  height:260px;
  object-fit:cover;
  display:block;
  transition:0.3s;
  background:#f5f5f5;
}

.item:hover img,
.item:hover video{
  transform:scale(1.02);
}

/* =========================
LIGHTBOX
========================= */

.lightbox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.92);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.lightbox.active{
  display:flex;
}

.lightbox-content{
  max-width:95%;
  max-height:90%;
  position:relative;
}

.lightbox img,
.lightbox video{
  max-width:100%;
  max-height:90vh;
  border-radius:10px;
}

.close-btn{
  position:absolute;
  top:20px;
  right:30px;
  color:white;
  font-size:40px;
  cursor:pointer;
  z-index:10000;
}

.nav-btn{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:rgba(255,255,255,0.2);
  border:none;
  color:white;
  font-size:40px;
  width:60px;
  height:60px;
  cursor:pointer;
  border-radius:50%;
}

.prev-btn{
  left:20px;
}

.next-btn{
  right:20px;
}

.loading{
  text-align:center;
  padding:50px;
  font-size:20px;
  color:#333;
}

</style>
</head>
<body>

<div class="container">

  <h1>Grenada 2026</h1>

  <div id="loading" class="loading">
    Loading gallery...
  </div>

  <div id="gallery" class="gallery"></div>

</div>

<!-- LIGHTBOX -->

<div id="lightbox" class="lightbox">

  <div
    class="close-btn"
    onclick="closeLightbox()"
  >
    ×
  </div>

  <button
    class="nav-btn prev-btn"
    onclick="previousItem()"
  >
    ‹
  </button>

  <div
    id="lightboxContent"
    class="lightbox-content"
  ></div>

  <button
    class="nav-btn next-btn"
    onclick="nextItem()"
  >
    ›
  </button>

</div>

<script>

// =====================================
// FOLDERS USERS CAN VIEW
// =====================================

const FOLDERS = [

  'Grenada_2026/images',
   'Grenada_2026/videos'

]

// =====================================

const API_URL =
  'https://sparkling-darkness-3cbb.luisandreagan.workers.dev/'

let galleryFiles = []

let currentIndex = 0

// =========================
// VIDEO OBSERVER
// =========================

const observer =
  new IntersectionObserver(
    entries => {

      entries.forEach(entry => {

        const video =
          entry.target

        if(entry.isIntersecting){

          video.play()

        } else {

          video.pause()

        }

      })

    },
    {
      threshold:0.4
    }
  )

async function loadGallery(){

  const gallery =
    document.getElementById('gallery')

  const loading =
    document.getElementById('loading')

  gallery.innerHTML = ''

  try{

    let allFiles = []

    // LOAD FILES FROM ALL FOLDERS
    for(const folder of FOLDERS){

      const response =
        await fetch(
          API_URL +
          '?folder=' +
          encodeURIComponent(folder)
        )

      const files =
        await response.json()

      allFiles =
        [...allFiles, ...files]

    }

    // SORT NEWEST FIRST
    allFiles.sort((a,b)=>
      new Date(b.uploaded) -
      new Date(a.uploaded)
    )

    galleryFiles =
      allFiles

    loading.style.display = 'none'

    allFiles.forEach((file,index)=>{

      const item =
        document.createElement('div')

      item.className = 'item'

      let mediaHTML = ''

      // IMAGE
      if(file.type === 'image'){

        mediaHTML = `
          <img
            src="${file.url}"
            loading="lazy"
          >
        `

      }

      // VIDEO
      else{

        mediaHTML = `
          <video
            muted
            playsinline
            autoplay
            loop
            preload="metadata"
          >
            <source src="${file.url}#t=0.1">
          </video>
        `

      }

      item.innerHTML =
        mediaHTML

      item.onclick = ()=>{
        openLightbox(index)
      }

      gallery.appendChild(item)

      // OBSERVE VIDEOS
      const video =
        item.querySelector('video')

      if(video){

        observer.observe(video)

      }

    })

  } catch(err){

    document.getElementById('loading')
      .innerHTML =
        'Failed to load gallery.'

    console.error(err)

  }

}

// =========================
// LIGHTBOX
// =========================

function openLightbox(index){

  currentIndex = index

  const file =
    galleryFiles[index]

  const lightbox =
    document.getElementById('lightbox')

  const content =
    document.getElementById('lightboxContent')

  // IMAGE
  if(file.type === 'image'){

    content.innerHTML = `
      <img src="${file.url}">
    `

  }

  // VIDEO
  else{

    content.innerHTML = `
      <video
        controls
        autoplay
        playsinline
      >
        <source src="${file.url}">
      </video>
    `

  }

  lightbox.classList.add('active')

}

function closeLightbox(){

  document
    .getElementById('lightbox')
    .classList.remove('active')

}

function nextItem(){

  currentIndex++

  if(
    currentIndex >=
    galleryFiles.length
  ){
    currentIndex = 0
  }

  openLightbox(currentIndex)

}

function previousItem(){

  currentIndex--

  if(currentIndex < 0){
    currentIndex =
      galleryFiles.length - 1
  }

  openLightbox(currentIndex)

}

// =========================
// KEYBOARD NAVIGATION
// =========================

document.addEventListener(
  'keydown',
  e => {

    const lightbox =
      document.getElementById('lightbox')

    if(
      !lightbox.classList.contains(
        'active'
      )
    ){
      return
    }

    if(e.key === 'ArrowRight'){
      nextItem()
    }

    if(e.key === 'ArrowLeft'){
      previousItem()
    }

    if(e.key === 'Escape'){
      closeLightbox()
    }

  }
)

loadGallery()

</script>

</body>
</html>
