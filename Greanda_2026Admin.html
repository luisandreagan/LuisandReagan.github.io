<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Gallery</title>

<style>

body{
  margin:0;
  background:#0f0f0f;
  color:white;
  font-family:Arial,sans-serif;
}

.container{
  max-width:1600px;
  margin:auto;
  padding:20px;
}

h1{
  text-align:center;
  margin-bottom:30px;
}

.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:15px;
}

.item{
  background:#1b1b1b;
  border-radius:12px;
  overflow:hidden;
}

.item img,
.item video{
  width:100%;
  height:260px;
  object-fit:cover;
  display:block;
  background:black;
}

.info{
  padding:15px;
}

.filename{
  font-size:13px;
  color:#ccc;
  word-break:break-all;
}

.date{
  margin-top:10px;
  font-size:12px;
  color:#888;
}

.actions{
  margin-top:15px;
  display:flex;
  gap:10px;
}

.download-btn,
.delete-btn{
  border:none;
  padding:10px 14px;
  border-radius:8px;
  cursor:pointer;
  color:white;
  text-decoration:none;
  font-size:14px;
}

.download-btn{
  background:#0d6efd;
}

.delete-btn{
  background:#dc3545;
}

.loading{
  text-align:center;
  padding:50px;
  font-size:20px;
}

.empty{
  text-align:center;
  color:#888;
  padding:50px;
}

/* =========================
LIGHTBOX
========================= */

.lightbox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.lightbox.active{
  display:flex;
}

.lightbox-content{
  max-width:95%;
  max-height:90%;
}

.lightbox img,
.lightbox video{
  max-width:100%;
  max-height:90vh;
  border-radius:10px;
}

.close-btn{
  position:absolute;
  top:20px;
  right:30px;
  color:white;
  font-size:40px;
  cursor:pointer;
}

.nav-btn{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  width:60px;
  height:60px;
  border:none;
  border-radius:50%;
  background:rgba(255,255,255,0.2);
  color:white;
  font-size:40px;
  cursor:pointer;
}

.prev-btn{
  left:20px;
}

.next-btn{
  right:20px;
}

</style>
</head>
<body>

<div class="container">

  <h1>Pending Admin Gallery</h1>

  <div id="loading" class="loading">
    Loading gallery...
  </div>

  <div id="gallery" class="gallery"></div>

</div>

<!-- LIGHTBOX -->

<div id="lightbox" class="lightbox">

  <div
    class="close-btn"
    onclick="closeLightbox()"
  >
    ×
  </div>

  <button
    class="nav-btn prev-btn"
    onclick="previousItem()"
  >
    ‹
  </button>

  <div
    id="lightboxContent"
    class="lightbox-content"
  ></div>

  <button
    class="nav-btn next-btn"
    onclick="nextItem()"
  >
    ›
  </button>

</div>

<script>

// =====================================
// ONLY THESE FOLDERS WILL DISPLAY
// =====================================

const FOLDERS = [

  'Grenada_2026',
  //'API_Uploads/videos'

  // ADD MORE HERE
  // 'Wedding2026/photos',
  // 'Events/videos'

]

// =====================================

const API_URL =
  'https://sparkling-darkness-3cbb.luisandreagan.workers.dev/'

let galleryFiles = []

let currentIndex = 0

async function loadGallery(){

  const gallery =
    document.getElementById('gallery')

  const loading =
    document.getElementById('loading')

  gallery.innerHTML = ''

  try{

    let allFiles = []

    // LOAD FILES FROM SELECTED FOLDERS
    for(const folder of FOLDERS){

      const response =
        await fetch(
          API_URL +
          '?folder=' +
          encodeURIComponent(folder)
        )

      const files =
        await response.json()

      allFiles =
        [...allFiles, ...files]

    }

    // SORT NEWEST FIRST
    allFiles.sort((a,b)=>
      new Date(b.uploaded) -
      new Date(a.uploaded)
    )

    galleryFiles =
      allFiles

    loading.style.display = 'none'

    if(!allFiles.length){

      gallery.innerHTML = `
        <div class="empty">
          No files found.
        </div>
      `

      return

    }

    allFiles.forEach((file,index)=>{

      const item =
        document.createElement('div')

      item.className = 'item'

      const uploadedDate =
        new Date(file.uploaded)
          .toLocaleString()

      let mediaHTML = ''

      // IMAGE
      if(file.type === 'image'){

        mediaHTML = `
          <img
            src="${file.url}"
            loading="lazy"
          >
        `

      }

      // VIDEO
      else{

        mediaHTML = `
          <video muted>
            <source src="${file.url}">
          </video>
        `

      }

      item.innerHTML = `

        <div
          onclick="openLightbox(${index})"
          style="cursor:pointer"
        >

          ${mediaHTML}

        </div>

        <div class="info">

          <div class="filename">
            ${file.key}
          </div>

          <div class="date">
            ${uploadedDate}
          </div>

          <div class="actions">

            <a
              class="download-btn"
              href="${file.url}"
              target="_blank"
            >
              Download
            </a>

            <button
              class="delete-btn"
              onclick="deleteFile('${file.key}')"
            >
              Delete
            </button>

          </div>

        </div>
      `

      gallery.appendChild(item)

    })

  } catch(err){

    loading.innerHTML =
      'Failed to load gallery.'

    console.error(err)

  }

}

// =========================
// DELETE FILE
// =========================

async function deleteFile(fileKey){

  const confirmed =
    confirm(
      'Delete this file?'
    )

  if(!confirmed){
    return
  }

  try{

    const response =
      await fetch(
        API_URL,
        {
          method:'DELETE',
          headers:{
            'Content-Type':'application/json'
          },
          body:JSON.stringify({
            key:fileKey
          })
        }
      )

    if(response.ok){

      loadGallery()

    } else {

      alert(
        'Failed to delete file'
      )

    }

  } catch(err){

    console.error(err)

    alert(
      'Error deleting file'
    )

  }

}

// =========================
// LIGHTBOX
// =========================

function openLightbox(index){

  currentIndex = index

  const file =
    galleryFiles[index]

  const lightbox =
    document.getElementById('lightbox')

  const content =
    document.getElementById('lightboxContent')

  // IMAGE
  if(file.type === 'image'){

    content.innerHTML = `
      <img src="${file.url}">
    `

  }

  // VIDEO
  else{

    content.innerHTML = `
      <video controls autoplay>
        <source src="${file.url}">
      </video>
    `

  }

  lightbox.classList.add('active')

}

function closeLightbox(){

  document
    .getElementById('lightbox')
    .classList.remove('active')

}

function nextItem(){

  currentIndex++

  if(
    currentIndex >=
    galleryFiles.length
  ){
    currentIndex = 0
  }

  openLightbox(currentIndex)

}

function previousItem(){

  currentIndex--

  if(currentIndex < 0){
    currentIndex =
      galleryFiles.length - 1
  }

  openLightbox(currentIndex)

}

// KEYBOARD NAVIGATION

document.addEventListener(
  'keydown',
  e => {

    const lightbox =
      document.getElementById('lightbox')

    if(
      !lightbox.classList.contains(
        'active'
      )
    ){
      return
    }

    if(e.key === 'ArrowRight'){
      nextItem()
    }

    if(e.key === 'ArrowLeft'){
      previousItem()
    }

    if(e.key === 'Escape'){
      closeLightbox()
    }

  }
)

loadGallery()

</script>

</body>
</html>
