<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uploads Gallery</title>

<style>

body{
  margin:0;
  background:#0f0f0f;
  color:white;
  font-family:Arial,sans-serif;
}

.container{
  max-width:1400px;
  margin:auto;
  padding:30px 20px;
}

h1{
  text-align:center;
  margin-bottom:40px;
}

.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
  gap:20px;
}

.card{
  background:#1b1b1b;
  border-radius:12px;
  overflow:hidden;
}

.preview{
  width:100%;
  height:300px;
  object-fit:cover;
  display:block;
  background:black;
}

.info{
  padding:15px;
}

.filename{
  font-size:14px;
  color:#ccc;
  word-break:break-all;
}

.date{
  margin-top:10px;
  font-size:12px;
  color:#888;
}

.actions{
  margin-top:15px;
  display:flex;
  gap:10px;
}

.download-btn,
.delete-btn{
  border:none;
  padding:10px 16px;
  border-radius:8px;
  cursor:pointer;
  text-decoration:none;
  color:white;
  font-size:14px;
}

.download-btn{
  background:#0d6efd;
}

.delete-btn{
  background:#dc3545;
}

.loading{
  text-align:center;
  padding:50px;
  font-size:20px;
}

.empty{
  text-align:center;
  padding:40px;
  color:#888;
}

</style>
</head>
<body>

<div class="container">

  <h1>Uploads Gallery</h1>

  <div id="loading" class="loading">
    Loading uploads...
  </div>

  <div id="gallery" class="gallery"></div>

</div>

<script>

const API_URL =
  'https://sparkling-darkness-3cbb.luisandreagan.workers.dev/'

async function loadGallery(){

  const gallery =
    document.getElementById('gallery')

  const loading =
    document.getElementById('loading')

  gallery.innerHTML = ''

  try{

    const response =
      await fetch(API_URL)

    const files =
      await response.json()

    loading.style.display = 'none'

    if(!files.length){

      gallery.innerHTML = `
        <div class="empty">
          No uploads found.
        </div>
      `

      return

    }

    files.forEach(file => {

      const card =
        document.createElement('div')

      card.className = 'card'

      const uploadedDate =
        new Date(file.uploaded)
          .toLocaleString()

      let previewHTML = ''

      if(file.type === 'image'){

        previewHTML = `
          <img
            src="${file.url}"
            class="preview"
            loading="lazy"
          >
        `

      } else {

        previewHTML = `
          <video
            class="preview"
            controls
          >
            <source src="${file.url}">
          </video>
        `

      }

      card.innerHTML = `

        ${previewHTML}

        <div class="info">

          <div class="filename">
            ${file.key}
          </div>

          <div class="date">
            ${uploadedDate}
          </div>

          <div class="actions">

            <a
              class="download-btn"
              href="${file.url}"
              target="_blank"
            >
              Download
            </a>

            <button
              class="delete-btn"
              onclick="deleteFile('${file.key}')"
            >
              Delete
            </button>

          </div>

        </div>
      `

      gallery.appendChild(card)

    })

  } catch(err){

    loading.innerHTML =
      'Failed to load uploads.'

    console.error(err)

  }

}

async function deleteFile(fileKey){

  const confirmed =
    confirm('Delete this file?')

  if(!confirmed){
    return
  }

  try{

    const response = await fetch(
      API_URL,
      {
        method:'DELETE',
        headers:{
          'Content-Type':'application/json'
        },
        body:JSON.stringify({
          key:fileKey
        })
      }
    )

    if(response.ok){

      document.getElementById('loading')
        .style.display = 'block'

      document.getElementById('loading')
        .innerHTML = 'Refreshing gallery...'

      loadGallery()

    } else {

      alert('Failed to delete file')

    }

  } catch(err){

    console.error(err)

    alert('Error deleting file')

  }

}

loadGallery()

</script>

</body>
</html>
