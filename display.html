<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gallery</title>

<style>

body{
  margin:0;
  background:#0f0f0f;
  color:white;
  font-family:Arial,sans-serif;
}

.container{
  max-width:1400px;
  margin:auto;
  padding:30px 20px;
}

h1{
  text-align:center;
  margin-bottom:40px;
}

.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:20px;
}

.card{
  background:#1b1b1b;
  border-radius:12px;
  overflow:hidden;
}

.card img,
.card video{
  width:100%;
  height:300px;
  object-fit:cover;
  display:block;
}

.info{
  padding:15px;
}

.filename{
  font-size:14px;
  color:#ccc;
  word-break:break-all;
}

.date{
  margin-top:10px;
  font-size:12px;
  color:#888;
}

.download{
  display:inline-block;
  margin-top:12px;
  padding:10px 16px;
  background:#0d6efd;
  color:white;
  text-decoration:none;
  border-radius:8px;
}

.loading{
  text-align:center;
  padding:50px;
  font-size:20px;
}

</style>
</head>
<body>

<div class="container">

  <h1>Uploads Gallery</h1>

  <div id="loading" class="loading">
    Loading uploads...
  </div>

  <div class="gallery" id="gallery"></div>

</div>

<script>

const API_URL =
  'https://sparkling-darkness-3cbb.luisandreagan.workers.dev/'

async function loadGallery(){

  const gallery =
    document.getElementById('gallery')

  const loading =
    document.getElementById('loading')

  try{

    const response =
      await fetch(API_URL)

    const files =
      await response.json()

    loading.style.display = 'none'

    if(!files.length){

      gallery.innerHTML =
        '<p>No uploads found.</p>'

      return

    }

    files.forEach(file => {

      const card =
        document.createElement('div')

      card.className = 'card'

      const uploadedDate =
        new Date(file.uploaded)
          .toLocaleString()

      if(file.type === 'image'){

        card.innerHTML = `

          <img src="${file.url}">

          <div class="info">

            <div class="filename">
              ${file.key}
            </div>

            <div class="date">
              ${uploadedDate}
            </div>

            <a
              class="download"
              href="${file.url}"
              target="_blank"
            >
              Open File
            </a>

          </div>
        `

      } else {

        card.innerHTML = `

          <video controls>
            <source src="${file.url}">
          </video>

          <div class="info">

            <div class="filename">
              ${file.key}
            </div>

            <div class="date">
              ${uploadedDate}
            </div>

            <a
              class="download"
              href="${file.url}"
              target="_blank"
            >
              Open File
            </a>

          </div>
        `

      }

      gallery.appendChild(card)

    })

  } catch(err){

    loading.innerHTML =
      'Failed to load uploads.'

    console.error(err)

  }

}

loadGallery()

</script>

</body>
</html>
